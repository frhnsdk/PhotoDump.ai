<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Dump – PhotoDump</title>
  <link rel="stylesheet" href="/static/main.css?v=4" />
</head>
<body class="page-auth">

  <nav class="navbar">
    <a class="logo" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      PhotoDump
    </a>
    <div class="nav-actions" id="navActions">
      <a class="btn btn-ghost" href="/login">Log in</a>
      <a class="btn btn-outline" href="/register">Sign up</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1>
        <span class="gl-icon sm" style="--gl1:#9b8ff8;--gl2:#6c5ff0"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.95)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
        Access a Dump
      </h1>
      <p class="auth-sub">Enter the dump name and password you received from the organiser.</p>
      <div id="accessError" class="alert alert-error hidden"></div>
      <div class="form-group">
        <label>Dump Name</label>
        <input type="text" id="dumpName" placeholder="my-wedding-2024" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="dumpPass" placeholder="••••••" />
      </div>
      <button class="btn btn-primary btn-full" onclick="accessDump()" id="accessBtn">Access Dump →</button>
    </div>
  </div>

  <script src="/js/api.js?v=4"></script>
  <script>
    const user = API.getUser();
    if (user) {
      document.getElementById("navActions").innerHTML =
        `<span class="nav-user">👋 ${user.username}</span>
         <a class="btn btn-outline" href="/dashboard">Dashboard</a>`;
    }

    // Pre-fill from query string
    const params = new URLSearchParams(location.search);
    if (params.get("dump")) document.getElementById("dumpName").value = params.get("dump");

    document.getElementById("dumpPass").addEventListener("keydown", e => {
      if (e.key === "Enter") accessDump();
    });

    async function accessDump() {
      const name = document.getElementById("dumpName").value.trim();
      const pass = document.getElementById("dumpPass").value;
      const errEl = document.getElementById("accessError");
      const btn = document.getElementById("accessBtn");
      errEl.classList.add("hidden");
      if (!name || !pass) {
        errEl.textContent = "Please fill in all fields.";
        errEl.classList.remove("hidden");
        return;
      }
      btn.textContent = "Checking…";
      btn.disabled = true;
      try {
        const data = await API.post("/api/dumps/access", { name, password: pass });
        API.setDumpToken(name, data.dump_token);
        window.location.href = `/view-dump?dump=${encodeURIComponent(name)}`;
      } catch (e) {
        errEl.textContent = e.message || "Access denied.";
        errEl.classList.remove("hidden");
        btn.textContent = "Access Dump →";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
