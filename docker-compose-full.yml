# ── PhotoDump — All-In-One (Single Server) ──────────────────────────────────
# Runs app + database + GPU service on ONE machine.
# Usage:
#   docker compose -f docker-compose-full.yml up -d --build

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-photodump}
      POSTGRES_USER: ${DB_USER:-photodump}
      POSTGRES_PASSWORD: ${DB_PASS:-photodump}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-photodump} -d ${DB_NAME:-photodump}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── GPU Face Recognition Service ───────────────────────────────────────────
  gpu-service:
    build:
      context: ./gpu-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEEPFACE_HOME: /app/models
      DEEPFACE_MODEL: ${DEEPFACE_MODEL:-Facenet512}
      DEEPFACE_DETECTOR: ${DEEPFACE_DETECTOR:-retinaface}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.35}
      TF_CPP_MIN_LOG_LEVEL: "2"
      DO_NOT_TRACK: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - model_cache:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── FastAPI App ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-photodump}
      DB_USER: ${DB_USER:-photodump}
      DB_PASS: ${DB_PASS:-photodump}
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_in_production}
      GPU_SERVICE_URL: http://gpu-service:5050
      DATA_DIR: /app/data
      FRONTEND_DIR: /app/frontend
    volumes:
      - photodumpstorage:/app/data
    depends_on:
      db:
        condition: service_healthy
      gpu-service:
        condition: service_healthy

volumes:
  pg_data:
    driver: local
  photodumpstorage:
    driver: local
  model_cache:
    driver: local
